<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bolão Oscar 2026</title>
    <style>
        :root {
            --bg-color: #121212;
            --app-bg: #1e1e1e;
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
            --gold: #d4af37;
            --gold-hover: #b5952f;
            --card-bg: #2a2a2a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Container centralizado imitando um app mobile */
        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--app-bg);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* Cabeçalho */
        header {
            background-color: #000;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
        }
        header h1 {
            font-size: 1.5rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .progress {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        /* Área de Conteúdo */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            /* Adiciona o espaço extra da safe-area no final da rolagem */
            padding-bottom: calc(90px + env(safe-area-inset-bottom)); 
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #000;
            display: flex;
            /* O segredo está aqui: padding superior 10px, direita/esquerda 0, inferior 10px + safe-area */
            padding: 10px 0 calc(10px + env(safe-area-inset-bottom)) 0;
            overflow-x: auto;
            border-top: 1px solid #333;
            cursor: grab;
            scrollbar-width: none; /* Firefox */
        }
        .category-title {
            font-size: 1.3rem;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        /* Cartões de Indicados */
        .nominee-card {
            background-color: var(--card-bg);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
        }
        .nominee-card:hover {
            background-color: #333;
        }
        .nominee-card.selected {
            border-color: var(--gold);
            background-color: rgba(212, 175, 55, 0.1);
        }
        .nominee-card .radio-btn {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nominee-card.selected .radio-btn {
            border-color: var(--gold);
        }
        .nominee-card.selected .radio-btn::after {
            content: '';
            width: 10px;
            height: 10px;
            background-color: var(--gold);
            border-radius: 50%;
        }

        /* Menu Inferior (Rodapé) */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background-color: #000;
            display: flex;
            padding: 10px 0;
            overflow-x: auto;
            border-top: 1px solid #333;
            cursor: grab;
            /* Esconder scrollbar */
            scrollbar-width: none; /* Firefox */
        }
        .bottom-nav::-webkit-scrollbar {
            display: none; /* Chrome, Safari */
        }
        .bottom-nav:active {
            cursor: grabbing;
        }

        .nav-item {
            min-width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            cursor: pointer;
            user-select: none;
        }
        .nav-item.active {
            color: var(--gold);
        }
        .nav-item.completed .icon::after {
            content: '✓';
            position: absolute;
            top: -5px;
            right: -5px;
            background: var(--gold);
            color: #000;
            border-radius: 50%;
            width: 15px;
            height: 15px;
            font-size: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }
        .nav-item .icon {
            font-size: 1.5rem;
            margin-bottom: 5px;
            position: relative;
        }
        .nav-item .label {
            font-size: 0.65rem;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 70px;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Oscar 2026</h1>
        <div class="progress" id="progress-text">0 de 24 categorias apostadas</div>
    </header>

    <div class="content" id="content-area">
        </div>

    <div class="bottom-nav" id="bottom-nav">
        </div>
</div>

<script>
    // 1. DADOS DAS CATEGORIAS (Lista completa)
    const categorias = [
        { id: "filme", title: "Melhor Filme", icon: "🎬", nominees: ["Bugonia", "F1", "Frankenstein", "Hamnet", "Marty Supreme", "Uma Batalha Após A Outra", "O Agente Secreto", "Valor Sentimental", "Pecadores", "Sonhos de Trem"] },
        { id: "direcao", title: "Melhor Direção", icon: "🎥", nominees: ["Chloé Zhao (Hamnet)", "Josh Safdie (Marty Supreme)", "Paul Thomas Anderson (Uma Batalha Após A Outra)", "Joachim Trier (Valor Sentimental)", "Ryan Coogler (Pecadores)"] },
        { id: "ator", title: "Melhor Ator", icon: "👨", nominees: ["Timothée Chalamet (Marty Supreme)", "Leonardo DiCaprio (Uma Batalha Após A Outra)", "Ethan Hawke (Blue Moon)", "Michael B. Jordan (Pecadores)", "Wagner Moura (O Agente Secreto)"] },
        { id: "atriz", title: "Melhor Atriz", icon: "👩", nominees: ["Jessie Buckley (Hamnet)", "Rose Byrne (Se Eu Tivesse Pernas, Eu Te Chutaria)", "Kate Hudson (Song Sung Blue)", "Renat Reinsve (Valor Sentimental)", "Emma Stone (Bugonia)"] },
        { id: "ator_coad", title: "Ator Coadjuvante", icon: "🎭", nominees: ["Benicio del Toro (Uma Batalha Após A Outra)", "Jacob Elordi (Frankenstein)", "Delroy Lindo (Pecadores)", "Sean Penn (Uma Batalha Após A Outra)", "Stellan Skarsgård (Valor Sentimental)"] },
        { id: "atriz_coad", title: "Atriz Coadjuvante", icon: "💃", nominees: ["Elle Fanning (Valor Sentimental)", "Inga Ibsdotter Lilleaas (Valor Sentimental)", "Amy Madigan (A Hora do Mal)", "Wunmi Mosaku (Pecadores)", "Teyana Taylor (Uma Batalha Após A Outra)"] },
        { id: "elenco", title: "Melhor Elenco", icon: "🤝", nominees: ["Hamnet", "Marty Supreme", "Uma Batalha Após a Outra", "O Agente Secreto", "Pecadores"] },
        { id: "rot_orig", title: "Roteiro Original", icon: "📝", nominees: ["Blue Moon", "Foi Apenas Um Acidente", "Marty Supreme", "Valor Sentimental", "Pecadores"] },
        { id: "rot_adap", title: "Roteiro Adaptado", icon: "📚", nominees: ["Bugonia", "Frankenstein", "Hamnet", "Uma Batalha Após A Outra", "Sonhos de Trem"] },
        { id: "animacao", title: "Filme de Animação", icon: "🐻", nominees: ["Arco", "Elio", "Guerreiras do K-pop", "A Pequena Amélie", "Zootopia 2"] },
        { id: "internacional", title: "Filme Internacional", icon: "🌍", nominees: ["O Agente Secreto", "Foi Apenas Um Acidente", "Valor Sentimental", "Sirat", "The Voice of Hind Rajab"] },
        { id: "doc_longa", title: "Doc. Longa", icon: "🎞️", nominees: ["Alabama: Presos no Alabama", "Embaixo da Luz Neon", "Cutting Through Rocks", "Mr Nobody Against Putin", "A Vizinha Perfeita"] },
        { id: "doc_curta", title: "Doc. Curta", icon: "📼", nominees: ["Quartos Vazios", "Armed Only with a Camera...", "Children No More...", "O Diabo Não Tem Descanso", "Perfectly A Strangeness"] },
        { id: "curta_live", title: "Curta Live Action", icon: "⏱️", nominees: ["Butcher's Stain", "A Friend Of Dorothy", "Jane Austen's Period Drama", "The Singers", "Two People Exchanging Saliva"] },
        { id: "curta_anim", title: "Curta Animação", icon: "🖌️", nominees: ["Butterfly", "Forevergreen", "The Girl Who Cried Pearls", "Retirement Plan", "The Three Sisters"] },
        { id: "trilha", title: "Trilha Sonora", icon: "🎻", nominees: ["Bugonia", "Frankenstein", "Hamnet", "Uma Batalha Após A Outra", "Pecadores"] },
        { id: "cancao", title: "Canção Original", icon: "🎵", nominees: ["Dear Me (Diane Warren)", "Golden (Guerreiras do K-pop)", "I Lied To You (Pecadores)", "Sweet Dreams Of Joy (Viva Verdi!)", "Sonhos de Trem (Sonhos de Trem)"] },
        { id: "som", title: "Melhor Som", icon: "🔊", nominees: ["F1", "Frankenstein", "Uma Batalha Após A Outra", "Pecadores", "Sirāt"] },
        { id: "fotografia", title: "Fotografia", icon: "📸", nominees: ["Frankenstein", "Marty Supreme", "Uma Batalha Após A Outra", "Pecadores", "Sonhos de Trem"] },
        { id: "design", title: "Design de Produção", icon: "🏛️", nominees: ["Frankenstein", "Hamnet", "Marty Supreme", "Uma Batalha Após A Outra", "Pecadores"] },
        { id: "figurino", title: "Figurino", icon: "👗", nominees: ["Avatar: Fogo e Cinzas", "Frankenstein", "Hamnet", "Marty Supreme", "Pecadores"] },
        { id: "cabelo", title: "Cabelo e Maquiagem", icon: "💄", nominees: ["Frankenstein", "Kokuho", "Pecadores", "Coração de Lutador...", "A Meia-Irmã Feia"] },
        { id: "montagem", title: "Montagem", icon: "✂️", nominees: ["F1", "Marty Supreme", "Uma Batalha Após A Outra", "Valor Sentimental", "Pecadores"] },
        { id: "efeitos", title: "Efeitos Visuais", icon: "💥", nominees: ["Avatar: Fogo e Cinzas", "F1", "Jurassic World: Recomeço", "O Ônibus Perdido", "Pecadores"] }
    ];

    // 2. ESTADO DO APLICATIVO
    let currentCategoryIndex = 0;
    let apostas = JSON.parse(localStorage.getItem('oscarBets2026')) || {};

    const contentArea = document.getElementById('content-area');
    const bottomNav = document.getElementById('bottom-nav');
    const progressText = document.getElementById('progress-text');

    // 3. FUNÇÕES DE RENDERIZAÇÃO
    function updateProgress() {
        const total = categorias.length;
        const feitas = Object.keys(apostas).length;
        progressText.innerText = `${feitas} de ${total} categorias apostadas`;
    }

    function renderCategory() {
        const cat = categorias[currentCategoryIndex];
        let html = `<div class="category-title">${cat.icon} ${cat.title}</div>`;
        
        cat.nominees.forEach(nominee => {
            const isSelected = apostas[cat.id] === nominee;
            html += `
                <div class="nominee-card ${isSelected ? 'selected' : ''}" onclick="makeBet('${cat.id}', '${nominee.replace(/'/g, "\\'")}')">
                    <div class="radio-btn"></div>
                    <div class="nominee-name">${nominee}</div>
                </div>
            `;
        });
        contentArea.innerHTML = html;
        updateNav();
        updateProgress();
    }

    function renderNav() {
        let html = '';
        categorias.forEach((cat, index) => {
            html += `
                <div class="nav-item ${index === currentCategoryIndex ? 'active' : ''} ${apostas[cat.id] ? 'completed' : ''}" 
                     onclick="changeCategory(${index})" id="nav-${index}">
                    <div class="icon">${cat.icon}</div>
                    <div class="label">${cat.title}</div>
                </div>
            `;
        });
        bottomNav.innerHTML = html;
    }

    function updateNav() {
        document.querySelectorAll('.nav-item').forEach((el, index) => {
            el.classList.toggle('active', index === currentCategoryIndex);
            el.classList.toggle('completed', !!apostas[categorias[index].id]);
        });
        
        // Centraliza o item ativo na barra de navegação suavemente
        const activeNav = document.getElementById(`nav-${currentCategoryIndex}`);
        if(activeNav) {
            bottomNav.scrollTo({
                left: activeNav.offsetLeft - bottomNav.offsetWidth / 2 + activeNav.offsetWidth / 2,
                behavior: 'smooth'
            });
        }
    }

    // 4. AÇÕES DO USUÁRIO
    window.makeBet = function(categoryId, nominee) {
        apostas[categoryId] = nominee;
        localStorage.setItem('oscarBets2026', JSON.stringify(apostas));
        renderCategory();
        
        // Avança para a próxima categoria automaticamente (se houver) após 400ms
        setTimeout(() => {
            if(currentCategoryIndex < categorias.length - 1) {
                currentCategoryIndex++;
                renderCategory();
            }
        }, 400);
    }

    window.changeCategory = function(index) {
        currentCategoryIndex = index;
        renderCategory();
    }

    // 5. LÓGICA DE ARRASTAR O MENU (Mouse Drag)
    let isDown = false;
    let startX;
    let scrollLeft;

    bottomNav.addEventListener('mousedown', (e) => {
        isDown = true;
        bottomNav.classList.add('active');
        startX = e.pageX - bottomNav.offsetLeft;
        scrollLeft = bottomNav.scrollLeft;
    });
    bottomNav.addEventListener('mouseleave', () => { isDown = false; });
    bottomNav.addEventListener('mouseup', () => { isDown = false; });
    bottomNav.addEventListener('mousemove', (e) => {
        if (!isDown) return;
        e.preventDefault();
        const x = e.pageX - bottomNav.offsetLeft;
        const walk = (x - startX) * 2; // Velocidade do arrasto
        bottomNav.scrollLeft = scrollLeft - walk;
    });

    // 6. INICIALIZAÇÃO
    renderNav();
    renderCategory();

</script>
</body>
</html>
