<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bolão Oscar 2026</title>
    <style>
        :root {
            --bg-color: #121212;
            --app-bg: #1e1e1e;
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
            --gold: #d4af37;
            --card-bg: #2a2a2a;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--app-bg);
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }

        header {
            background-color: #000;
            padding: 20px 20px 10px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            flex-shrink: 0;
        }

        header h1 {
            font-size: 1.3rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 5px;
            text-transform: uppercase;
        }

        .category-nav {
            background-color: #000;
            display: flex;
            padding: 10px 0;
            overflow-x: auto;
            border-bottom: 1px solid #333;
            scrollbar-width: none;
            cursor: grab;
            flex-shrink: 0;
        }

        .category-nav::-webkit-scrollbar { display: none; }

        .nav-item {
            min-width: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.4;
            transition: 0.2s;
            color: var(--text-main);
            padding: 0 5px;
        }

        .nav-item.active { opacity: 1; color: var(--gold); transform: scale(1.1); }
        .nav-item.completed { opacity: 0.8; }

        .nav-item .icon { font-size: 1.4rem; position: relative; }
        .nav-item.completed .icon::after {
            content: '✓';
            position: absolute;
            top: -5px; right: -8px;
            background: var(--gold);
            color: #000;
            font-size: 9px;
            width: 14px; height: 14px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }
        .nav-item span { font-size: 0.55rem; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: calc(40px + var(--safe-area-bottom));
        }

        .category-title {
            font-size: 1.2rem;
            margin-bottom: 20px;
            text-align: center;
            font-weight: bold;
        }

        .nominee-card {
            width: 100%;
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            text-align: left;
            color: var(--text-main);
            transition: 0.2s;
        }

        .nominee-card.selected {
            border-color: var(--gold);
            background-color: rgba(212, 175, 55, 0.1);
        }

        .radio-circle {
            min-width: 20px; height: 20px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            margin-right: 15px;
            position: relative;
            flex-shrink: 0;
        }

        .selected .radio-circle { border-color: var(--gold); }
        .selected .radio-circle::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 10px; height: 10px;
            background-color: var(--gold);
            border-radius: 50%;
        }

        .btn-finish {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 18px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            font-size: 1rem;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Oscar 2026</h1>
        <div class="progress" id="progress-text">0 de 24 categorias</div>
    </header>

    <nav class="category-nav" id="category-nav"></nav>

    <main class="content" id="content-area"></main>
</div>

<script>
    (function() {
        const categorias = [
            { id: "filme", title: "Melhor Filme", icon: "🎬", nominees: ["Bugonia", "F1", "Frankenstein", "Hamnet", "Marty Supreme", "Uma Batalha Após A Outra", "O Agente Secreto", "Valor Sentimental", "Pecadores", "Sonhos de Trem"] },
            { id: "direcao", title: "Melhor Direção", icon: "🎥", nominees: ["Chloé Zhao (Hamnet)", "Josh Safdie (Marty Supreme)", "Paul Thomas Anderson (Uma Batalha Após A Outra)", "Joachim Trier (Valor Sentimental)", "Ryan Coogler (Pecadores)"] },
            { id: "ator", title: "Melhor Ator", icon: "👨", nominees: ["Timothée Chalamet (Marty Supreme)", "Leonardo DiCaprio (Uma Batalha Após A Outra)", "Ethan Hawke (Blue Moon)", "Michael B. Jordan (Pecadores)", "Wagner Moura (O Agente Secreto)"] },
            { id: "atriz", title: "Melhor Atriz", icon: "👩", nominees: ["Jessie Buckley (Hamnet)", "Rose Byrne (Se Eu Tivesse Pernas, Eu Te Chutaria)", "Kate Hudson (Song Sung Blue)", "Renat Reinsve (Valor Sentimental)", "Emma Stone (Bugonia)"] },
            { id: "ator_coad", title: "Ator Coadjuvante", icon: "🎭", nominees: ["Benicio del Toro (Uma Batalha Após A Outra)", "Jacob Elordi (Frankenstein)", "Delroy Lindo (Pecadores)", "Sean Penn (Uma Batalha Após A Outra)", "Stellan Skarsgård (Valor Sentimental)"] },
            { id: "atriz_coad", title: "Atriz Coadjuvante", icon: "💃", nominees: ["Elle Fanning (Valor Sentimental)", "Inga Ibsdotter Lilleaas (Valor Sentimental)", "Amy Madigan (A Hora do Mal)", "Wunmi Mosaku (Pecadores)", "Teyana Taylor (Uma Batalha Após A Outra)"] },
            { id: "elenco", title: "Melhor Elenco", icon: "🤝", nominees: ["Hamnet", "Marty Supreme", "Uma Batalha Após a Outra", "O Agente Secreto", "Pecadores"] },
            { id: "roteiro_orig", title: "Roteiro Original", icon: "📝", nominees: ["Blue Moon", "Foi Apenas Um Acidente", "Marty Supreme", "Valor Sentimental", "Pecadores"] },
            { id: "roteiro_adap", title: "Roteiro Adaptado", icon: "📚", nominees: ["Bugonia", "Frankestein", "Hamnet", "Uma Batalha Após A Outra", "Sonhos de Trem"] },
            { id: "animacao", title: "Animação", icon: "🐻", nominees: ["Arco", "Elio", "Guerreiras do K-pop", "A Pequena Amélie", "Zootopia 2"] },
            { id: "internacional", title: "Filme Internacional", icon: "🌍", nominees: ["O Agente Secreto", "Foi Apenas Um Acidente", "Valor Sentimental", "Sirat", "The Voice of Hind Rajab"] },
            { id: "doc_longa", title: "Documentário", icon: "🎞️", nominees: ["Alabama: Presos no Alabama", "Embaixo da Luz Neon", "Cutting Through Rocks", "Mr Nobody Against Putin", "A Vizinha Perfeita"] },
            { id: "doc_curta", title: "Doc. Curta", icon: "⏱️", nominees: ["Quartos Vazios", "Armed Only with a Camera: The Life and Death of Brent Renaud", "Children No More: Were and are Gone", "O Diabo Não Tem Descanso", "Perfectly A Strangeness"] },
            { id: "curta_live", title: "Curta Live Action", icon: "🎬", nominees: ["Butcher's Stain", "A Friend Of Dorothy", "Jane Austen's Period Drama", "The Singers", "Two People Exchanging Saliva"] },
            { id: "curta_anim", title: "Curta Animação", icon: "✏️", nominees: ["Butterfly", "Forevergreen", "The Girl Who Cried Pearls", "Retirement Plan", "The Three Sisters"] },
            { id: "trilha", title: "Trilha Sonora", icon: "🎵", nominees: ["Bugonia", "Frankestein", "Hamnet", "Uma Batalha Após A Outra", "Pecadores"] },
            { id: "cancao", title: "Canção Original", icon: "🎤", nominees: ["Dear Me (Diane Warren: Relentless)", "Golden (Guerreiras do K-pop)", "I Lied To You (Pecadores)", "Sweet Dreams Of Joy (Viva Verdi!)", "Sonhos de Trem (Sonhos de Trem)"] },
            { id: "som", title: "Melhor Som", icon: "🔊", nominees: ["F1", "Frankenstein", "Uma Batalha Após A Outra", "Pecadores", "Sirāt"] },
            { id: "fotografia", title: "Fotografia", icon: "📸", nominees: ["Frankenstein", "Marty Supreme", "Uma Batalha Após A Outra", "Pecadores", "Sonhos de Trem"] },
            { id: "design", title: "Design de Produção", icon: "🏰", nominees: ["Frankenstein", "Hamnet", "Marty Supreme", "Uma Batalha Após A Outra", "Pecadores"] },
            { id: "figurino", title: "Figurino", icon: "👗", nominees: ["Avatar: Fogo e Cinzas", "Frankenstein", "Hamnet", "Marty Supreme", "Pecadores"] },
            { id: "maquiagem", title: "Cabelo e Maquiagem", icon: "💄", nominees: ["Frankenstein", "Kokuho", "Pecadores", "Coração de Lutador: The Smashing Machine", "A Meia-Irmã Feia"] },
            { id: "montagem", title: "Montagem", icon: "✂️", nominees: ["F1", "Marty Supreme", "Uma Batalha Após A Outra", "Valor Sentimental", "Pecadores"] },
            { id: "efeitos", title: "Efeitos Visuais", icon: "💥", nominees: ["Avatar: Fogo e Cinzas", "F1", "Jurassic World: Recomeço", "O Ônibus Perdido", "Pecadores"] }
        ];

        let state = {
            currentIndex: 0,
            bets: JSON.parse(localStorage.getItem('oscar2026_v4')) || {}
        };

        const contentArea = document.getElementById('content-area');
        const navBar = document.getElementById('category-nav');
        const progressText = document.getElementById('progress-text');

        function init() {
            renderNav();
            renderCategory();
            setupDragScroll();
        }

        function renderCategory() {
            const cat = categorias[state.currentIndex];
            const allDone = Object.keys(state.bets).length === categorias.length;

            let html = `<div class="category-title">${cat.title}</div>`;
            
            cat.nominees.forEach(nominee => {
                const isSelected = state.bets[cat.id] === nominee;
                html += `
                    <button class="nominee-card ${isSelected ? 'selected' : ''}" 
                            onclick="app.makeBet('${cat.id}', '${nominee.replace(/'/g, "\\'")}')">
                        <div class="radio-circle"></div>
                        <span>${nominee}</span>
                    </button>
                `;
            });

            if (allDone && state.currentIndex === categorias.length - 1) {
                html += `<button class="btn-finish" onclick="app.exportBets()">📤 Compartilhar Palpites</button>`;
            }

            contentArea.innerHTML = html;
            contentArea.scrollTop = 0; 
            updateUI();
        }

        function renderNav() {
            navBar.innerHTML = categorias.map((cat, i) => {
                // Tenta usar um nome curto para o menu superior baseando-se no ID
                const shortName = cat.id.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                return `
                <button class="nav-item" onclick="app.goTo(${i})" id="nav-${i}">
                    <div class="icon">${cat.icon}</div>
                    <span>${shortName}</span>
                </button>
            `}).join('');
        }

        function updateUI() {
            const count = Object.keys(state.bets).length;
            progressText.innerText = `${count} de ${categorias.length} categorias`;

            document.querySelectorAll('.nav-item').forEach((el, i) => {
                el.classList.toggle('active', i === state.currentIndex);
                el.classList.toggle('completed', !!state.bets[categorias[i].id]);
            });

            const activeNav = document.getElementById(`nav-${state.currentIndex}`);
            if(activeNav) {
                navBar.scrollTo({
                    left: activeNav.offsetLeft - navBar.offsetWidth / 2 + activeNav.offsetWidth / 2,
                    behavior: 'smooth'
                });
            }
        }

        window.app = {
            makeBet: (catId, nominee) => {
                state.bets[catId] = nominee;
                // Alterei a chave do localStorage para evitar conflito com as versões anteriores do seu código
                localStorage.setItem('oscar2026_v4', JSON.stringify(state.bets));
                renderCategory();
                
                setTimeout(() => {
                    if (state.currentIndex < categorias.length - 1) {
                        state.currentIndex++;
                        renderCategory();
                    }
                }, 400);
            },
            goTo: (index) => {
                state.currentIndex = index;
                renderCategory();
            },
            exportBets: () => {
    let text = "🏆 *MEUS PALPITES OSCAR 2026* 🏆\n\n";
    categorias.forEach(c => {
        if(state.bets[c.id]) text += `*${c.title}:* ${state.bets[c.id]}\n`;
    });
    
    // Adiciona o convite e o link no final da mensagem
    text += "\n🎬 Faça suas apostas também em:\nhttps://harrybour43.github.io/ooscarvaipara/";
    
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
}
        };

        function setupDragScroll() {
            let isDown = false, startX, scrollLeft;
            navBar.addEventListener('mousedown', (e) => {
                isDown = true; startX = e.pageX - navBar.offsetLeft; scrollLeft = navBar.scrollLeft;
            });
            navBar.addEventListener('mouseleave', () => isDown = false);
            navBar.addEventListener('mouseup', () => isDown = false);
            navBar.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                const x = e.pageX - navBar.offsetLeft;
                navBar.scrollLeft = scrollLeft - (x - startX) * 2;
            });
        }

        init();
    })();
</script>
</body>
</html>
