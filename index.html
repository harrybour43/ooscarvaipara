<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bolão Oscar 2026</title>
    <style>
        :root {
            --bg-color: #121212;
            --app-bg: #1e1e1e;
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
            --gold: #d4af37;
            --card-bg: #2a2a2a;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--app-bg);
            display: flex;
            flex-direction: column;
            height: 100%;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }

        header {
            background-color: #000;
            padding: 20px 20px 10px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            flex-shrink: 0;
            z-index: 10;
        }

        header h1 {
            font-size: 1.3rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress {
            font-size: 0.7rem;
            color: var(--text-muted);
            margin-top: 5px;
            text-transform: uppercase;
        }

        .category-nav {
            background-color: #000;
            display: flex;
            padding: 10px 0;
            overflow-x: auto;
            border-bottom: 1px solid #333;
            scrollbar-width: none;
            cursor: grab;
            flex-shrink: 0;
            transition: max-height 0.4s ease, padding 0.4s ease, opacity 0.4s ease;
            max-height: 100px;
            opacity: 1;
        }

        .category-nav::-webkit-scrollbar { display: none; }

        /* Classe ativada quando todas as categorias estão preenchidas */
        .category-nav.collapsed {
            max-height: 0;
            padding: 0;
            border-bottom: none;
            opacity: 0;
            pointer-events: none;
        }

        .nav-item {
            min-width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: none;
            border: none;
            cursor: pointer;
            opacity: 0.4;
            transition: 0.3s;
            color: var(--text-main);
            padding: 0 5px;
        }

        .nav-item.active { opacity: 1; color: var(--gold); transform: scale(1.15); font-weight: bold; }
        .nav-item.completed { opacity: 0.8; }

        .nav-item .icon { font-size: 1.4rem; position: relative; }
        .nav-item.completed .icon::after {
            content: '✓';
            position: absolute;
            top: -5px; right: -8px;
            background: var(--gold);
            color: #000;
            font-size: 9px;
            width: 14px; height: 14px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }
        .nav-item span { font-size: 0.55rem; margin-top: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }

        .main-layout {
            display: flex;
            flex-direction: column;
            flex: 1;
            overflow: hidden;
        }

        .voting-section {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            position: relative;
        }

        .winners-section {
            flex: 1;
            overflow-y: auto;
            background-color: #151515;
            border-top: 2px solid #333;
            padding: 20px;
            padding-bottom: calc(20px + var(--safe-area-bottom));
        }

        .category-title {
            font-size: 1.2rem;
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
        }

        .section-title {
            font-size: 1rem;
            color: var(--gold);
            text-align: center;
            font-weight: bold;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .nominee-card {
            width: 100%;
            background-color: var(--card-bg);
            padding: 14px;
            border-radius: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            text-align: left;
            color: var(--text-main);
            transition: 0.2s;
            font-size: 0.95rem;
        }

        .nominee-card.selected {
            border-color: var(--gold);
            background-color: rgba(212, 175, 55, 0.1);
        }

        .radio-circle {
            min-width: 20px; height: 20px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            margin-right: 15px;
            position: relative;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .selected .radio-circle { border-color: var(--gold); }
        .selected .radio-circle::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 10px; height: 10px;
            background-color: var(--gold);
            border-radius: 50%;
        }

        .nominee-card.winner {
            border-color: var(--gold);
            background-color: rgba(212, 175, 55, 0.2);
            cursor: default;
            font-weight: bold;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .winner-icon {
            font-size: 1.2rem;
            margin-right: 15px;
            min-width: 20px;
            text-align: center;
        }

        .nominee-card.disabled {
            opacity: 0.5;
            cursor: default;
            filter: grayscale(100%);
        }

        .nominee-card.wrong-bet {
            border-color: #ff4c4c;
            background-color: rgba(255, 76, 76, 0.1);
        }

        .nominee-card.correct-bet {
            border-color: #4caf50;
            background-color: rgba(76, 175, 80, 0.2);
        }

        .error-circle {
            border-color: transparent;
            color: #ff4c4c;
            font-size: 0.8rem;
        }

        .btn-finish {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 12px;
            width: 100%;
            font-weight: bold;
            margin-top: 15px;
            cursor: pointer;
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            transition: transform 0.2s;
        }
        
        .btn-finish:active {
            transform: scale(0.98);
        }

        .winner-list-item {
            background: #222;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 10px;
            border-left: 4px solid var(--gold);
            display: flex;
            flex-direction: column;
        }

        .winner-list-cat {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .winner-list-name {
            font-size: 0.95rem;
            font-weight: bold;
            color: #fff;
        }

        .empty-winners {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 30px;
            font-style: italic;
        }
        
        .loading-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--app-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            color: var(--gold);
            font-weight: bold;
            transition: opacity 0.5s;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Oscar 2026</h1>
        <div class="progress" id="progress-text">0 de 24 categorias</div>
    </header>

    <nav class="category-nav" id="category-nav"></nav>

    <div class="main-layout">
        <main class="voting-section" id="content-area">
            <div id="loading" class="loading-overlay">Sincronizando resultados ao vivo...</div>
        </main>

        <aside class="winners-section" id="winners-area">
            <div class="section-title">Vencedores Anunciados</div>
            <div id="winners-list">
                </div>
        </aside>
    </div>
</div>

<script>
    (function() {
        let categorias = [
            { id: "filme", title: "Melhor Filme", icon: "🎬", nominees: ["Bugonia", "F1", "Frankenstein", "Hamnet", "Marty Supreme", "Uma Batalha Após A Outra", "O Agente Secreto", "Valor Sentimental", "Pecadores", "Sonhos de Trem"] },
            { id: "direcao", title: "Melhor Direção", icon: "🎥", nominees: ["Chloé Zhao (Hamnet)", "Josh Safdie (Marty Supreme)", "Paul Thomas Anderson (Uma Batalha Após A Outra)", "Joachim Trier (Valor Sentimental)", "Ryan Coogler (Pecadores)"] },
            { id: "ator", title: "Melhor Ator", icon: "👨", nominees: ["Timothée Chalamet (Marty Supreme)", "Leonardo DiCaprio (Uma Batalha Após A Outra)", "Ethan Hawke (Blue Moon)", "Michael B. Jordan (Pecadores)", "Wagner Moura (O Agente Secreto)"] },
            { id: "atriz", title: "Melhor Atriz", icon: "👩", nominees: ["Jessie Buckley (Hamnet)", "Rose Byrne (Se Eu Tivesse Pernas, Eu Te Chutaria)", "Kate Hudson (Song Sung Blue)", "Renat Reinsve (Valor Sentimental)", "Emma Stone (Bugonia)"] },
            { id: "ator_coad", title: "Ator Coadjuvante", icon: "🎭", nominees: ["Benicio del Toro (Uma Batalha Após A Outra)", "Jacob Elordi (Frankenstein)", "Delroy Lindo (Pecadores)", "Sean Penn (Uma Batalha Após A Outra)", "Stellan Skarsgård (Valor Sentimental)"] },
            { id: "atriz_coad", title: "Atriz Coadjuvante", icon: "💃", nominees: ["Elle Fanning (Valor Sentimental)", "Inga Ibsdotter Lilleaas (Valor Sentimental)", "Amy Madigan (A Hora do Mal)", "Wunmi Mosaku (Pecadores)", "Teyana Taylor (Uma Batalha Após A Outra)"] },
            { id: "elenco", title: "Melhor Elenco", icon: "🤝", nominees: ["Hamnet", "Marty Supreme", "Uma Batalha Após a Outra", "O Agente Secreto", "Pecadores"] },
            { id: "roteiro_orig", title: "Roteiro Original", icon: "📝", nominees: ["Blue Moon", "Foi Apenas Um Acidente", "Marty Supreme", "Valor Sentimental", "Pecadores"] },
            { id: "roteiro_adap", title: "Roteiro Adaptado", icon: "📚", nominees: ["Bugonia", "Frankestein", "Hamnet", "Uma Batalha Após A Outra", "Sonhos de Trem"] },
            { id: "animacao", title: "Animação", icon: "🐻", nominees: ["Arco", "Elio", "Guerreiras do K-pop", "A Pequena Amélie", "Zootopia 2"] },
            { id: "internacional", title: "Filme Internacional", icon: "🌍", nominees: ["O Agente Secreto", "Foi Apenas Um Acidente", "Valor Sentimental", "Sirat", "The Voice of Hind Rajab"] },
            { id: "doc_longa", title: "Documentário", icon: "🎞️", nominees: ["Alabama: Presos no Alabama", "Embaixo da Luz Neon", "Cutting Through Rocks", "Mr Nobody Against Putin", "A Vizinha Perfeita"] },
            { id: "doc_curta", title: "Doc. Curta", icon: "⏱️", nominees: ["Quartos Vazios", "Armed Only with a Camera: The Life and Death of Brent Renaud", "Children No More: Were and are Gone", "O Diabo Não Tem Descanso", "Perfectly A Strangeness"] },
            { id: "curta_live", title: "Curta Live Action", icon: "🎬", nominees: ["Butcher's Stain", "A Friend Of Dorothy", "Jane Austen's Period Drama", "The Singers", "Two People Exchanging Saliva"] },
            { id: "curta_anim", title: "Curta Animação", icon: "✏️", nominees: ["Butterfly", "Forevergreen", "The Girl Who Cried Pearls", "Retirement Plan", "The Three Sisters"] },
            { id: "trilha", title: "Trilha Sonora", icon: "🎵", nominees: ["Bugonia", "Frankestein", "Hamnet", "Uma Batalha Após A Outra", "Pecadores"] },
            { id: "cancao", title: "Canção Original", icon: "🎤", nominees: ["Dear Me (Diane Warren: Relentless)", "Golden (Guerreiras do K-pop)", "I Lied To You (Pecadores)", "Sweet Dreams Of Joy (Viva Verdi!)", "Sonhos de Trem (Sonhos de Trem)"] },
            { id: "som", title: "Melhor Som", icon: "🔊", nominees: ["F1", "Frankenstein", "Uma Batalha Após A Outra", "Pecadores", "Sirāt"] },
            { id: "fotografia", title: "Fotografia", icon: "📸", nominees: ["Frankenstein", "Marty Supreme", "Uma Batalha Após A Outra", "Pecadores", "Sonhos de Trem"] },
            { id: "design", title: "Design de Produção", icon: "🏰", nominees: ["Frankenstein", "Hamnet", "Marty Supreme", "Uma Batalha Após A Outra", "Pecadores"] },
            { id: "figurino", title: "Figurino", icon: "👗", nominees: ["Avatar: Fogo e Cinzas", "Frankenstein", "Hamnet", "Marty Supreme", "Pecadores"] },
            { id: "maquiagem", title: "Cabelo e Maquiagem", icon: "💄", nominees: ["Frankenstein", "Kokuho", "Pecadores", "Coração de Lutador: The Smashing Machine", "A Meia-Irmã Feia"] },
            { id: "montagem", title: "Montagem", icon: "✂️", nominees: ["F1", "Marty Supreme", "Uma Batalha Após A Outra", "Valor Sentimental", "Pecadores"] },
            { id: "efeitos", title: "Efeitos Visuais", icon: "💥", nominees: ["Avatar: Fogo e Cinzas", "F1", "Jurassic World: Recomeço", "O Ônibus Perdido", "Pecadores"] }
        ];

        let state = {
            currentIndex: 0,
            bets: JSON.parse(localStorage.getItem('oscar2026_v4')) || {},
            winners: {}
        };

        const contentArea = document.getElementById('content-area');
        const navBar = document.getElementById('category-nav');
        const progressText = document.getElementById('progress-text');
        const winnersListContainer = document.getElementById('winners-list');

        async function fetchLiveWinners() {
            const url = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTMErYQWhRlSidpdmAq_hMPsDbojVlJBKFt-vpC7njOYBSiXNuIAtpI78768Tb9Bca5ChnQblzFc5a1/pub?gid=0&single=true&output=tsv";
            try {
                const response = await fetch(url);
                const text = await response.text();
                
                const rows = text.split('\n').map(r => r.split('\t').map(c => c.trim()));
                
                rows.forEach(row => {
                    if (row.length >= 2) {
                        const col0 = row[0].toLowerCase(); 
                        const col1 = row[1]; 
                        
                        if (col1) {
                            let matchedCat = categorias.find(c => 
                                c.title.toLowerCase() === col0 || 
                                c.id.toLowerCase() === col0 ||
                                col0.includes(c.title.toLowerCase())
                            );
                            
                            if (matchedCat) {
                                state.winners[matchedCat.id] = col1;
                            } else {
                                for (let cat of categorias) {
                                    if (cat.nominees.some(n => n.toLowerCase() === col1.toLowerCase() || n.toLowerCase().includes(col1.toLowerCase()))) {
                                        state.winners[cat.id] = col1;
                                        break;
                                    }
                                }
                            }
                        }
                    }
                });
            } catch (error) {
                console.warn("Não foi possível carregar os resultados da planilha.", error);
            }
        }

        async function init() {
            await fetchLiveWinners();
            
            // Joga as categorias com vencedor para o final da fila de navegação horizontal
            categorias.sort((a, b) => {
                const aWin = !!state.winners[a.id];
                const bWin = !!state.winners[b.id];
                if (aWin && !bWin) return 1;
                if (!aWin && bWin) return -1;
                return 0; 
            });

            // Encontra a primeira categoria não finalizada para começar nela
            const firstPending = categorias.findIndex(c => !state.bets[c.id] && !state.winners[c.id]);
            if (firstPending !== -1) {
                state.currentIndex = firstPending;
            } else {
                state.currentIndex = 0; // Se todas finalizadas, começa no início
            }

            const loading = document.getElementById('loading');
            if(loading) loading.style.display = 'none';

            renderNav();
            renderCategory();
            renderWinnersList();
            setupDragScroll();
        }

        function renderWinnersList() {
            const winnerIds = Object.keys(state.winners);
            
            if (winnerIds.length === 0) {
                winnersListContainer.innerHTML = '<div class="empty-winners">A cerimônia ainda não começou ou os dados estão sendo atualizados.</div>';
                return;
            }

            let html = '';
            // Lista pela ordem original em que foram declarados para fazer sentido lógico visual
            winnerIds.forEach(catId => {
                const catInfo = categorias.find(c => c.id === catId);
                if(catInfo) {
                    html += `
                        <div class="winner-list-item">
                            <span class="winner-list-cat">${catInfo.icon} ${catInfo.title}</span>
                            <span class="winner-list-name">🏆 ${state.winners[catId]}</span>
                        </div>
                    `;
                }
            });

            winnersListContainer.innerHTML = html;
        }

        function renderCategory() {
            const cat = categorias[state.currentIndex];
            const allCompleted = categorias.every(c => state.bets[c.id] || state.winners[c.id]);
            const categoryWinnerRaw = state.winners[cat.id];

            let html = `<div class="category-title">${cat.title}</div>`;
            
            let displayNominees = [...cat.nominees];
            let matchedWinner = null;

            if (categoryWinnerRaw) {
                matchedWinner = displayNominees.find(n => 
                    n.toLowerCase().includes(categoryWinnerRaw.toLowerCase()) || 
                    categoryWinnerRaw.toLowerCase().includes(n.toLowerCase())
                );
                
                if (matchedWinner) {
                    displayNominees = displayNominees.filter(n => n !== matchedWinner);
                    displayNominees.unshift(matchedWinner);
                } else {
                    matchedWinner = categoryWinnerRaw;
                    displayNominees.unshift(matchedWinner);
                }
            }
            
            displayNominees.forEach(nominee => {
                const isWinner = categoryWinnerRaw && (nominee === matchedWinner);
                const isSelected = state.bets[cat.id] === nominee;
                const isDisabled = !!categoryWinnerRaw;
                
                let classes = ['nominee-card'];
                
                if (isWinner) classes.push('winner');
                if (isSelected && !isWinner && categoryWinnerRaw) classes.push('wrong-bet');
                if (isSelected && isWinner) classes.push('correct-bet');
                if (!isWinner && isSelected && !categoryWinnerRaw) classes.push('selected');
                if (isDisabled && !isWinner) classes.push('disabled');

                const onClickAction = isDisabled ? '' : `onclick="app.makeBet('${cat.id}', '${nominee.replace(/'/g, "\\'")}')"`;
                
                let iconHtml = `<div class="radio-circle"></div>`;
                if (isWinner) {
                    iconHtml = `<div class="winner-icon">🏆</div>`;
                } else if (isSelected && categoryWinnerRaw) {
                    iconHtml = `<div class="radio-circle error-circle">❌</div>`;
                }

                html += `
                    <button class="${classes.join(' ')}" ${onClickAction}>
                        ${iconHtml}
                        <span>${nominee}</span>
                    </button>
                `;
            });

            // Mostra o botão sempre que tudo estiver preenchido/finalizado
            if (allCompleted) {
                html += `<button class="btn-finish" onclick="app.exportBets()">📤 Compartilhar Palpites</button>`;
            }

            contentArea.innerHTML = html;
            contentArea.scrollTop = 0; 
            updateUI();
        }

        function renderNav() {
            navBar.innerHTML = categorias.map((cat, i) => {
                const shortName = cat.id.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
                return `
                <button class="nav-item" onclick="app.goTo(${i})" id="nav-${i}">
                    <div class="icon">${cat.icon}</div>
                    <span>${shortName}</span>
                </button>
            `}).join('');
        }

        function updateUI() {
            const betsCount = Object.keys(state.bets).length;
            progressText.innerText = `${betsCount} palpites de ${categorias.length} categorias`;

            const allCompleted = categorias.every(cat => state.bets[cat.id] || state.winners[cat.id]);

            if (allCompleted) {
                navBar.classList.add('collapsed');
            } else {
                navBar.classList.remove('collapsed');
            }

            document.querySelectorAll('.nav-item').forEach((el, i) => {
                el.classList.toggle('active', i === state.currentIndex);
                el.classList.toggle('completed', !!state.bets[categorias[i].id] || !!state.winners[categorias[i].id]);
            });

            const activeNav = document.getElementById(`nav-${state.currentIndex}`);
            if(activeNav && !allCompleted) {
                // Cálculo exato para manter o item centralizado no navBar
                const containerCenter = navBar.offsetWidth / 2;
                const itemCenter = activeNav.offsetLeft + (activeNav.offsetWidth / 2);
                
                navBar.scrollTo({
                    left: itemCenter - containerCenter,
                    behavior: 'smooth'
                });
            }
        }

        window.app = {
            makeBet: (catId, nominee) => {
                state.bets[catId] = nominee;
                localStorage.setItem('oscar2026_v4', JSON.stringify(state.bets));
                renderCategory();
                
                setTimeout(() => {
                    // Pula para a próxima categoria que ainda precise de palpite e não tenha vencedor
                    let nextIndex = state.currentIndex;
                    let found = false;
                    for(let i = 1; i < categorias.length; i++) {
                        let tryIndex = (state.currentIndex + i) % categorias.length;
                        const c = categorias[tryIndex];
                        if (!state.bets[c.id] && !state.winners[c.id]) {
                            nextIndex = tryIndex;
                            found = true;
                            break;
                        }
                    }

                    if (found) {
                        state.currentIndex = nextIndex;
                        renderCategory();
                    }
                }, 400);
            },
            goTo: (index) => {
                state.currentIndex = index;
                renderCategory();
            },
            exportBets: () => {
                let text = "🏆 *MEUS PALPITES OSCAR 2026* 🏆\n\n";
                categorias.forEach(c => {
                    if(state.bets[c.id]) {
                        let mark = "";
                        if (state.winners[c.id]) {
                            const won = state.bets[c.id].toLowerCase().includes(state.winners[c.id].toLowerCase()) || state.winners[c.id].toLowerCase().includes(state.bets[c.id].toLowerCase());
                            mark = won ? " ✅" : " ❌";
                        }
                        text += `*${c.title}:* ${state.bets[c.id]}${mark}\n`;
                    }
                });
                
                text += "\n🎬 Faça suas apostas também em:\nhttps://harrybour43.github.io/ooscarvaipara/";
                window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
            }
        };

        function setupDragScroll() {
            let isDown = false, startX, scrollLeft;
            navBar.addEventListener('mousedown', (e) => {
                isDown = true; startX = e.pageX - navBar.offsetLeft; scrollLeft = navBar.scrollLeft;
            });
            navBar.addEventListener('mouseleave', () => isDown = false);
            navBar.addEventListener('mouseup', () => isDown = false);
            navBar.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                const x = e.pageX - navBar.offsetLeft;
                navBar.scrollLeft = scrollLeft - (x - startX) * 2;
            });
        }

        init();
    })();
</script>
</body>
</html>
