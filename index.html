<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Bolão Oscar 2026</title>
    <style>
        :root {
            --bg-color: #121212;
            --app-bg: #1e1e1e;
            --text-main: #f5f5f5;
            --text-muted: #aaaaaa;
            --gold: #d4af37;
            --card-bg: #2a2a2a;
            --safe-area-bottom: env(safe-area-inset-bottom);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden; /* Trava o scroll do body para focar no app */
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background-color: var(--app-bg);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.7);
        }

        header {
            background-color: #000;
            padding: 20px 20px 15px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            z-index: 10;
        }

        header h1 {
            font-size: 1.4rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
            font-weight: bold;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            /* Espaço para não cobrir o conteúdo pelo menu e safe areas */
            padding-bottom: calc(120px + var(--safe-area-bottom));
            scroll-behavior: smooth;
        }

        .category-title {
            font-size: 1.25rem;
            margin-bottom: 20px;
            text-align: center;
            color: var(--gold);
        }

        /* Botão de indicação (Acessibilidade) */
        .nominee-card {
            width: 100%;
            background-color: var(--card-bg);
            padding: 16px;
            border-radius: 12px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.1s, background-color 0.2s;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            text-align: left;
            color: var(--text-main);
            font-size: 1rem;
        }

        .nominee-card:active { transform: scale(0.98); }

        .nominee-card.selected {
            border-color: var(--gold);
            background-color: rgba(212, 175, 55, 0.15);
        }

        .radio-circle {
            min-width: 22px;
            height: 22px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            margin-right: 15px;
            position: relative;
        }

        .selected .radio-circle { border-color: var(--gold); }
        .selected .radio-circle::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 10px; height: 10px;
            background-color: var(--gold);
            border-radius: 50%;
        }

        /* Menu Inferior */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(10px);
            display: flex;
            padding: 12px 0 calc(12px + var(--safe-area-bottom));
            overflow-x: auto;
            border-top: 1px solid #333;
            scrollbar-width: none;
            cursor: grab;
        }

        .bottom-nav::-webkit-scrollbar { display: none; }

        .nav-item {
            min-width: 75px;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.5;
            transition: 0.3s;
            background: none;
            border: none;
            cursor: pointer;
        }

        .nav-item.active { opacity: 1; color: var(--gold); }
        .nav-item.completed { opacity: 0.9; }

        .nav-item .icon { font-size: 1.4rem; margin-bottom: 4px; position: relative; }
        .nav-item.completed .icon::after {
            content: '✓';
            position: absolute;
            -5px; right: -8px;
            background: var(--gold);
            color: #000;
            font-size: 9px;
            width: 14px; height: 14px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: bold;
        }

        .nav-item span { font-size: 0.6rem; color: inherit; white-space: nowrap; }

        .btn-finish {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 15px;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            display: none;
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>Oscar 2026</h1>
        <div class="progress" id="progress-text">Carregando...</div>
    </header>

    <main class="content" id="content-area"></main>

    <nav class="bottom-nav" id="bottom-nav"></nav>
</div>

<script>
    (function() {
        const categorias = [
            { id: "filme", title: "Melhor Filme", icon: "🎬", nominees: ["Bugonia", "F1", "Frankenstein", "Hamnet", "Marty Supreme", "Uma Batalha Após A Outra", "O Agente Secreto", "Valor Sentimental", "Pecadores", "Sonhos de Trem"] },
            { id: "direcao", title: "Melhor Direção", icon: "🎥", nominees: ["Chloé Zhao (Hamnet)", "Josh Safdie (Marty Supreme)", "Paul Thomas Anderson (Uma Batalha Após A Outra)", "Joachim Trier (Valor Sentimental)", "Ryan Coogler (Pecadores)"] },
            { id: "ator", title: "Melhor Ator", icon: "👨", nominees: ["Timothée Chalamet (Marty Supreme)", "Leonardo DiCaprio (Uma Batalha Após A Outra)", "Ethan Hawke (Blue Moon)", "Michael B. Jordan (Pecadores)", "Wagner Moura (O Agente Secreto)"] },
            { id: "atriz", title: "Melhor Atriz", icon: "👩", nominees: ["Jessie Buckley (Hamnet)", "Rose Byrne (Se Eu Tivesse Pernas...)", "Kate Hudson (Song Sung Blue)", "Renat Reinsve (Valor Sentimental)", "Emma Stone (Bugonia)"] },
            { id: "ator_coad", title: "Ator Coadjuvante", icon: "🎭", nominees: ["Benicio del Toro", "Jacob Elordi", "Delroy Lindo", "Sean Penn", "Stellan Skarsgård"] },
            { id: "atriz_coad", title: "Atriz Coadjuvante", icon: "💃", nominees: ["Elle Fanning", "Inga Ibsdotter Lilleaas", "Amy Madigan", "Wunmi Mosaku", "Teyana Taylor"] },
            { id: "elenco", title: "Melhor Elenco", icon: "🤝", nominees: ["Hamnet", "Marty Supreme", "Uma Batalha Após a Outra", "O Agente Secreto", "Pecadores"] },
            { id: "animacao", title: "Animação", icon: "🐻", nominees: ["Arco", "Elio", "Guerreiras do K-pop", "A Pequena Amélie", "Zootopia 2"] },
            { id: "internacional", title: "Filme Internacional", icon: "🌍", nominees: ["O Agente Secreto", "Foi Apenas Um Acidente", "Valor Sentimental", "Sirat", "The Voice of Hind Rajab"] }
            // ... (as demais categorias seguem a mesma lógica)
        ];

        let state = {
            currentIndex: 0,
            bets: JSON.parse(localStorage.getItem('oscar2026_bets')) || {}
        };

        const contentArea = document.getElementById('content-area');
        const bottomNav = document.getElementById('bottom-nav');
        const progressText = document.getElementById('progress-text');

        function init() {
            renderNav();
            renderCategory();
            setupDragScroll();
        }

        function renderCategory() {
            const cat = categorias[state.currentIndex];
            const isLast = state.currentIndex === categorias.length - 1;
            const allDone = Object.keys(state.bets).length === categorias.length;

            let html = `<div class="category-title">${cat.icon} ${cat.title}</div>`;
            
            cat.nominees.forEach(nominee => {
                const isSelected = state.bets[cat.id] === nominee;
                html += `
                    <button class="nominee-card ${isSelected ? 'selected' : ''}" 
                            onclick="app.makeBet('${cat.id}', '${nominee.replace(/'/g, "\\'")}')">
                        <div class="radio-circle"></div>
                        <span>${nominee}</span>
                    </button>
                `;
            });

            if (allDone) {
                html += `<button class="btn-finish" style="display:block" onclick="app.exportBets()">📤 Compartilhar Meus Palpites</button>`;
            }

            contentArea.innerHTML = html;
            updateUI();
        }

        function renderNav() {
            bottomNav.innerHTML = categorias.map((cat, i) => `
                <button class="nav-item" onclick="app.goTo(${i})" id="nav-${i}">
                    <div class="icon">${cat.icon}</div>
                    <span>${cat.id.substring(0,5)}</span>
                </button>
            `).join('');
        }

        function updateUI() {
            // Atualiza progresso
            const count = Object.keys(state.bets).length;
            progressText.innerText = `${count} de ${categorias.length} categorias concluídas`;

            // Atualiza Nav
            document.querySelectorAll('.nav-item').forEach((el, i) => {
                el.classList.toggle('active', i === state.currentIndex);
                el.classList.toggle('completed', !!state.bets[categorias[i].id]);
            });

            // Scroll suave do menu
            const activeNav = document.getElementById(`nav-${state.currentIndex}`);
            if(activeNav) {
                bottomNav.scrollTo({
                    left: activeNav.offsetLeft - bottomNav.offsetWidth / 2 + activeNav.offsetWidth / 2,
                    behavior: 'smooth'
                });
            }
        }

        // Namespace global para as funções chamadas no HTML
        window.app = {
            makeBet: (catId, nominee) => {
                state.bets[catId] = nominee;
                localStorage.setItem('oscar2026_bets', JSON.stringify(state.bets));
                renderCategory();
                
                setTimeout(() => {
                    if (state.currentIndex < categorias.length - 1) {
                        state.currentIndex++;
                        renderCategory();
                    }
                }, 300);
            },
            goTo: (index) => {
                state.currentIndex = index;
                renderCategory();
            },
            exportBets: () => {
                let text = "🏆 *MEUS PALPITES OSCAR 2026* 🏆\n\n";
                categorias.forEach(c => {
                    if(state.bets[c.id]) text += `*${c.title}:* ${state.bets[c.id]}\n`;
                });
                const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
                window.open(url, '_blank');
            }
        };

        function setupDragScroll() {
            let isDown = false, startX, scrollLeft;
            bottomNav.addEventListener('mousedown', (e) => {
                isDown = true; startX = e.pageX - bottomNav.offsetLeft; scrollLeft = bottomNav.scrollLeft;
            });
            bottomNav.addEventListener('mouseleave', () => isDown = false);
            bottomNav.addEventListener('mouseup', () => isDown = false);
            bottomNav.addEventListener('mousemove', (e) => {
                if(!isDown) return;
                const x = e.pageX - bottomNav.offsetLeft;
                bottomNav.scrollLeft = scrollLeft - (x - startX) * 2;
            });
        }

        init();
    })();
</script>
</body>
</html>
